<div class="card" style="margin-bottom:16px">
  <h3 style="font-size:15px; font-weight:600; margin-bottom:16px">New Wallet</h3>

  @if (error()) {
    <div class="alert-error">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px">
      <div class="form-group">
        <label>Name</label>
        <input type="text" formControlName="name" placeholder="e.g. Emergency Fund" />
      </div>
      <div class="form-group">
        <label>Category</label>
        <select formControlName="category">
          @for (cat of categories; track cat) {
            <option [value]="cat">{{ cat }}</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label>Initial Balance</label>
        <input type="number" formControlName="initialBalance" min="0" step="0.01" />
      </div>
      <div class="form-group">
        <label>Currency</label>
        <select formControlName="currency">
          <option value="COP">COP</option>
          <option value="USD">USD</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>Description (optional)</label>
      <input type="text" formControlName="description" placeholder="Brief description" />
    </div>

    <div class="flex gap-2 mt-2">
      <button type="submit" class="btn btn-primary btn-sm" [disabled]="loading()">
        @if (loading()) { Creating… } @else { Create Wallet }
      </button>
      <button type="button" class="btn btn-ghost btn-sm" (click)="cancelled.emit()">Cancel</button>
    </div>
  </form>
</div>

<style>
.alert-error {
  background: #ef444420; border: 1px solid #ef4444; color: #f87171;
  border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 12px; font-size: 13px;
}
</style>
