<div class="tx-form card" style="padding:14px; margin-top:8px">
  @if (error()) {
    <div class="alert-error">{{ error() }}</div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px">
      <div class="form-group" style="margin-bottom:0">
        <label>Type</label>
        <select formControlName="type">
          @for (t of types; track t) {
            <option [value]="t">{{ t }}</option>
          }
        </select>
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Amount ({{ currency }})</label>
        <input type="number" formControlName="amount" min="0.01" step="0.01" placeholder="0.00" />
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Category</label>
        <input type="text" formControlName="category" placeholder="e.g. Salary" />
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>Date</label>
        <input type="date" formControlName="occurredAt" />
      </div>
    </div>
    <div class="form-group" style="margin-top:8px; margin-bottom:8px">
      <label>Description</label>
      <input type="text" formControlName="description" placeholder="Optional note" />
    </div>
    <div class="flex gap-2">
      <button type="submit" class="btn btn-success btn-sm" [disabled]="loading()">
        @if (loading()) { Saving… } @else { Save }
      </button>
      <button type="button" class="btn btn-ghost btn-sm" (click)="cancelled.emit()">Cancel</button>
    </div>
  </form>
</div>

<style>
.alert-error {
  background: #ef444420; border: 1px solid #ef4444; color: #f87171;
  border-radius: var(--radius-sm); padding: 8px 12px; margin-bottom: 10px; font-size: 12px;
}
.tx-form { border: 1px solid var(--primary) !important; }
</style>
